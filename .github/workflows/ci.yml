name: CI

on:
  push:
  pull_request:

# Least privilege: this workflow only reads the repo (build/test/vet/vuln).
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # SHA-pinned to the commit the tag pointed at (supply-chain hardening).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: stable
          check-latest: true

      - name: Gofmt
        run: test -z "$(gofmt -l .)" || { echo 'gofmt drift — run gofmt -w .'; gofmt -l .; exit 1; }

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Test (race)
        run: go test -race ./...
        env:
          CGO_ENABLED: 1

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
