name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          check-latest: false

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Test (race)
        run: go test -race ./...
        env:
          CGO_ENABLED: 1

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
          govulncheck ./...
